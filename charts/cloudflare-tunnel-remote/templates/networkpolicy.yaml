{{- range .Values.destinations -}}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflare-tunnel-to-{{ .name }}-egress
spec:
  policyTypes:
    - Egress
  podSelector:
    matchLabels:
      app.kubernetes.io/component: cloudflare-tunnel
  egress:
    - to:
      -
      {{- with .podSelectors }}
        podSelector:
        {{- toYaml . | nindent 10 }}
      {{- end }}
      {{- with .namespaceSelectors }}
        namespaceSelector:
        {{- toYaml . | nindent 10 }}
      {{- end }}
    {{- with .ports }}
      ports:
      {{- toYaml . | nindent 8 }}
    {{- end }}
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflare-tunnel-to-cloudflare-egress
spec:
  policyTypes:
    - Egress
  podSelector:
    matchLabels:
      app.kubernetes.io/component: cloudflare-tunnel
  egress:
    - to:
      - ipBlock:
          cidr: 0.0.0.0/0
      ports:
        - protocol: UDP
          port: 7844
