---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-consumers-to-cluster-egress
spec:
  policyTypes:
    - Egress
  podSelector:
    matchLabels:
      {{- toYaml .Values.databaseconsumers.labels | nindent 6 }}
  egress:
    - to:
      - podSelector:
          matchLabels:
            app.kubernetes.io/component: database
      ports:
      - protocol: TCP
        port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-consumers-to-cluster-ingress
spec:
  policyTypes:
    - Ingress
  podSelector:
    matchLabels:
      app.kubernetes.io/component: database
  ingress:
    - from:
      - podSelector:
          matchLabels:
            {{- toYaml .Values.databaseconsumers.labels | nindent 12 }}
      ports:
      - protocol: TCP
        port: 5432
